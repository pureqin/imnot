partner: leanpms
description: LeanPMS Partner mock

datapoints:

  - name: token-general
    description: OAuth 2.0 General token endpoint
    pattern: static
    endpoints:
      - method: POST
        path: /api/auth/token
        response:
          status: 200
          body:
            token: "1234567890"

  - name: charges
    description: Sync charges retrieval
    pattern: fetch
    endpoints:
      - step: 1
        method: GET
        path: /api/v2/charges
        response:
          status: 200