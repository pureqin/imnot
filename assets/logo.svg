<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <!-- Gradient for the main text: deep blue → violet -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Gradient for the reflection: same but fading out -->
    <linearGradient id="reflectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4F8EF7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Mask that fades the reflection downward -->
    <linearGradient id="fadeMask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="reflectionMask">
      <rect x="0" y="60" width="320" height="40" fill="url(#fadeMask)"/>
    </mask>

    <!-- Wavy heat-shimmer filter -->
    <filter id="shimmer" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.3" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Main wordmark -->
  <text
    x="160" y="62"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="56"
    font-weight="700"
    letter-spacing="10"
    fill="url(#textGrad)"
  >IMNOT</text>

  <!-- Reflected wordmark — flipped vertically, wavy shimmer applied -->
  <g transform="translate(0, 124) scale(1, -1)" mask="url(#reflectionMask)">
    <text
      x="160" y="62"
      text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="56"
      font-weight="700"
      letter-spacing="10"
      fill="url(#reflectGrad)"
      filter="url(#shimmer)"
    >IMNOT</text>
  </g>

  <!-- Thin divider line between text and reflection -->
  <line x1="32" y1="70" x2="288" y2="70" stroke="url(#textGrad)" stroke-width="0.75" stroke-opacity="0.4"/>
</svg>
